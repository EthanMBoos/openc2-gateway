// OpenC2 Gateway Protocol
// 
// This defines the protobuf schema for vehicle-to-gateway communication.
// Vehicles send telemetry/heartbeats over UDP multicast; gateway sends commands.
// The gateway decodes protobuf and broadcasts JSON to connected UI clients.
//
// See docs/PROTOCOL.md for the JSON format sent to clients.

syntax = "proto3";

package openc2;

option go_package = "github.com/EthanMBoos/openc2-gateway/api/proto";

// NOTE: Messages MUST fit in a single UDP datagram (<1400 bytes recommended)
// to avoid fragmentation. Gateway should reject oversized frames.

// ============================================================================
// Vehicle → Gateway Envelope
// ============================================================================

// VehicleMessage is the envelope for all messages from vehicles to gateway.
// The oneof field number acts as the type discriminator in the wire format.
// Gateway unmarshals this first, then switches on which payload is set.
message VehicleMessage {
  oneof payload {
    VehicleTelemetry telemetry = 1;
    Heartbeat heartbeat = 2;
    Alert alert = 3;
    CommandAck command_ack = 4;
  }
}

// ============================================================================
// Telemetry Messages (Vehicle → Gateway)
// ============================================================================

// VehicleTelemetry is the primary telemetry message sent at high frequency.
// Contains position, velocity, and status information.
//
// NOTE: The `status` field here is for vehicles that include status in every
// telemetry packet. The gateway also tracks status independently based on
// telemetry gaps (see PROTOCOL.md - Offline Detection). Vehicles may omit
// this field if they send separate Heartbeat messages.
//
// TIMESTAMP WARNING: Vehicle clocks are UNTRUSTED (no RTC, no NTP, GPS cold start).
// Use `sequence_num` for ordering, not `timestamp_ms`. The gateway adds its own
// authoritative timestamp (`gts`) when translating to JSON.
message VehicleTelemetry {
  // Unique vehicle identifier (e.g., "ugv-husky-07")
  string vehicle_id = 1;
  
  // Unix timestamp in milliseconds - UNTRUSTED, vehicle-local clock
  // Use for display/logging only. See PROTOCOL.md for timestamp semantics.
  int64 timestamp_ms = 2;
  
  // Current position
  Location location = 3;
  
  // Ground speed in meters per second
  float speed_ms = 4;
  
  // True heading in degrees [0, 360), 0=North, 90=East
  // NOTE: 360 is normalized to 0. Gateway validates heading < 360.
  float heading_deg = 5;
  
  // Monotonic sequence number for ordering AND deduplication (per-vehicle, wraps at 2^32)
  // Gateway tracks high-water mark per vehicle; seq <= hwm is dropped as duplicate/stale.
  // Use this instead of timestamp for ordering - handles clock skew/reset.
  // See PROTOCOL.md "Gateway Deduplication" for wrap-around handling.
  uint32 sequence_num = 6;
  
  // Current operational status (optional - absence means not reported this frame)
  // Use has_status() to check presence. Gateway tracks status independently via telemetry gaps.
  optional VehicleStatus status = 7;
  
  // Operating environment
  VehicleEnvironment environment = 8;
  
  // Signal strength (0-5 bars, absence means unknown)
  optional uint32 signal_strength = 9;
  
  // Battery percentage (0-100, absence means unknown)
  optional uint32 battery_pct = 10;
  
  // ── Extension Support ──
  // See docs/EXTENSIBILITY.md for full extension architecture.
  //
  // IMPORTANT: There are TWO extension-related concepts:
  //
  // 1. extensions (this field) = LIVE STATE (10-100Hz telemetry)
  //    → "My battery voltage is 25.6V, drive mode is AUTONOMOUS"
  //    → Changes constantly, sent on every telemetry frame
  //
  // 2. VehicleCapabilities.extensions (in Heartbeat) = VALID COMMANDS (1Hz)
  //    → "I can do setDriveMode and triggerEStop"
  //    → Tells UI which buttons to show
  //
  // List of extension namespaces this vehicle supports (e.g., ["husky", "camera"])
  // Used by UI to filter CommandPanel buttons - only show commands the vehicle can handle.
  // Vehicles SHOULD populate this on every telemetry frame.
  repeated string supported_extensions = 19;
  
  // Extension data by namespace. Each extension is versioned independently.
  // Key = namespace (e.g., "husky"), Value = versioned extension payload.
  // Gateway decodes these via registered codecs and translates to JSON for UI.
  // Unknown extensions are passed through with error metadata (graceful degradation).
  map<string, ExtensionData> extensions = 20;
}

// ExtensionData wraps extension payloads with version metadata.
// This allows schema evolution per-extension without breaking the gateway.
message ExtensionData {
  // Schema version for this extension's payload format.
  // Codecs use this to select the correct decoder.
  // Start at 1; increment on breaking changes to payload schema.
  uint32 version = 1;
  
  // Serialized extension-specific proto (e.g., HuskyTelemetry).
  // Opaque to gateway core; decoded by namespace-specific codec.
  bytes payload = 2;
}

// Geographic location in WGS84 coordinates
message Location {
  // Latitude in degrees (-90 to 90)
  double latitude = 1;
  
  // Longitude in degrees (-180 to 180)
  double longitude = 2;
  
  // Altitude MSL in meters
  float altitude_msl_m = 3;
}

// Vehicle operational status
// NOTE: Use `optional` field semantics - absence means "not reported", not "unknown".
enum VehicleStatus {
  STATUS_ONLINE = 0;
  STATUS_OFFLINE = 1;
  STATUS_STANDBY = 2;
}

// Operating environment/domain
enum VehicleEnvironment {
  ENV_UNKNOWN = 0;
  ENV_AIR = 1;
  ENV_GROUND = 2;
  ENV_SURFACE = 3; // Water surface
}

// Heartbeat message sent periodically to confirm connectivity
// Note: battery_pct is only in VehicleTelemetry (single source of truth)
message Heartbeat {
  string vehicle_id = 1;
  int64 timestamp_ms = 2;
  VehicleStatus status = 3;
  int64 uptime_ms = 4;
  
  // Capability advertisement - tells gateway/UI what this vehicle supports.
  // Sent on every heartbeat so capabilities can change at runtime
  // (e.g., sensor added, extension module loaded).
  VehicleCapabilities capabilities = 5;
  
  // Vehicle type identifier for UI auto-matching to Vehicle profiles.
  // Example: "clearpath-husky-a200", "skydio-x2d", "bluerov2"
  // UI matches this against Vehicle.name or Vehicle.tags[] to automatically
  // link VehicleInstance to the correct Vehicle definition (static specs).
  // If no match found, UI can prompt operator or use a generic profile.
  string vehicle_type = 6;
}

// ============================================================================
// Vehicle Capabilities (advertised via Heartbeat)
// ============================================================================

// VehicleCapabilities advertises what commands/features a vehicle supports.
// This prevents the UI from showing buttons for unsupported actions and allows
// the gateway to fail-fast on invalid commands.
//
// DESIGN: Sent on EVERY heartbeat (1Hz), not just once.
//
// Why repeat on every heartbeat?
// - Stateless robustness: Gateway restart → learns caps from next heartbeat
// - UDP is unreliable: Lost packet recovers in 1 second  
// - Capabilities CAN change at runtime:
//   * Sensor failure → remove from sensors[]
//   * Battery critical → remove "goto" from supported_commands (can only RTL)
//   * E-Stop engaged → remove movement commands temporarily
//   * Hot-plugged hardware → add new sensor
//   * Firmware OTA update → new commands become available
//
// Industry precedent: MAVLink HEARTBEAT, ROS2 DDS, DIS entity state all
// advertise capabilities continuously for the same reasons.
//
// CRITICAL: Without capabilities, teams WILL fork the UI to hide buttons for
// vehicles that can't stop (fixed-wing), return home (tethered ROV), etc.
message VehicleCapabilities {
  // Core commands this vehicle supports.
  // Values: "goto", "stop", "return_home", "set_mode", "set_speed"
  // An empty list means observation-only (no commands accepted).
  repeated string supported_commands = 1;
  
  // Extension capabilities with specific supported actions.
  // More granular than just namespace - includes which commands within each extension
  // the vehicle actually implements.
  repeated ExtensionCapability extensions = 2;
  
  // Whether vehicle accepts mission waypoint sequences.
  // If false, only single-point commands (goto) are supported.
  bool supports_missions = 3;
  
  // Sensors attached to this vehicle.
  // Used by UI to display camera feeds, visualize sensor FOV, etc.
  repeated SensorCapability sensors = 4;
}

// ExtensionCapability advertises which actions a vehicle supports within an extension.
// This enables fine-grained filtering: a vehicle might support the "husky" extension
// but only implement "setDriveMode" and not "triggerEstop".
message ExtensionCapability {
  // Extension namespace (e.g., "husky", "camera")
  // Must match a registered extension codec in the gateway.
  string namespace = 1;
  
  // Schema version this vehicle implements.
  // Gateway can use this to select appropriate codec version.
  uint32 version = 2;
  
  // Specific actions this vehicle supports within the extension.
  // If empty, vehicle supports ALL actions defined in the manifest.
  // If populated, vehicle ONLY supports these specific actions.
  // Example: ["setDriveMode", "setBumperSensitivity"] (but not "triggerEstop")
  repeated string supported_actions = 3;
}

// SensorCapability describes an attached sensor with stream info.
// This is a CORE protocol feature (not an extension) because sensors are
// cross-cutting — nearly every robotics project needs camera/LiDAR support.
message SensorCapability {
  // Unique sensor identifier on this vehicle (e.g., "front_camera", "lidar_1")
  string sensor_id = 1;
  
  // Sensor type for UI rendering hints
  SensorType type = 2;
  
  // Stream URL if applicable (rtsp://, http://, ws://)
  // Empty for non-streaming sensors (IMU, GPS)
  string stream_url = 3;
  
  // Physical mounting position/orientation (for FOV visualization)
  SensorMount mount = 4;
  
  // Type-specific metadata (resolution, FOV, etc.)
  // Keys are sensor-type-specific; see SensorType documentation.
  map<string, string> metadata = 10;
}

// SensorType enumerates common sensor categories.
// UI can use this to select appropriate visualization (video player, point cloud, etc.)
enum SensorType {
  SENSOR_UNKNOWN = 0;
  SENSOR_CAMERA_RGB = 1;
  SENSOR_CAMERA_THERMAL = 2;
  SENSOR_CAMERA_DEPTH = 3;
  SENSOR_LIDAR_2D = 4;
  SENSOR_LIDAR_3D = 5;
  SENSOR_RADAR = 6;
  SENSOR_IMU = 7;
  SENSOR_GPS = 8;
}

// SensorMount describes the physical mounting of a sensor.
// Used by UI to visualize sensor FOV cones on the map.
message SensorMount {
  // Position offset from vehicle origin (meters, body frame)
  // X = forward, Y = left, Z = up
  float x = 1;
  float y = 2;
  float z = 3;
  
  // Orientation (Euler angles in degrees, body frame)
  // Roll/pitch/yaw convention: X-forward, Y-left, Z-up
  float roll = 4;
  float pitch = 5;
  float yaw = 6;
}

// Alert message for warnings, errors, and events
message Alert {
  string vehicle_id = 1;
  int64 timestamp_ms = 2;
  AlertSeverity severity = 3;
  string code = 4; // Machine-readable code (e.g., "GEOFENCE_BREACH")
  string message = 5; // Human-readable description
  Location location = 6; // Optional: where the alert occurred
}

enum AlertSeverity {
  SEVERITY_INFO = 0;
  SEVERITY_WARNING = 1;
  SEVERITY_ERROR = 2;
  SEVERITY_CRITICAL = 3;
}

// ============================================================================
// Command Messages (Gateway → Vehicle)
// ============================================================================

// IDEMPOTENCY CONTRACT: Vehicles MUST implement command handlers idempotently.
// The same command (identified by command_id) may be delivered multiple times
// due to UDP retransmission, network duplication, or gateway retry logic.
// All current commands (goto, stop, return_home, set_mode, set_speed) are
// naturally idempotent. Future commands with side effects (e.g., fire_payload,
// toggle_*) MUST either be idempotent or require vehicle-side deduplication.

// Command is the envelope for all commands sent to vehicles
message Command {
  // Unique command ID for tracking acknowledgments
  string command_id = 1;
  
  // Target vehicle ID
  string vehicle_id = 2;
  
  // Unix timestamp in milliseconds (UTC)
  int64 timestamp_ms = 3;
  
  // Command payload (one of the following)
  oneof payload {
    GotoCommand goto = 10;
    StopCommand stop = 11;
    ReturnHomeCommand return_home = 12;
    SetModeCommand set_mode = 13;
    SetSpeedCommand set_speed = 14;
    ExtensionCommand extension = 20; // Extension-defined commands
  }
}

// ExtensionCommand routes custom commands to extension-specific handlers.
// The gateway encodes this from JSON and broadcasts to vehicles.
// Vehicles decode based on namespace and action.
message ExtensionCommand {
  // Extension namespace (e.g., "husky") - must match a registered codec
  string namespace = 1;
  
  // Action within the extension (e.g., "setDriveMode")
  string action = 2;
  
  // Schema version for this command's payload format
  // Allows command schemas to evolve independently of telemetry schemas
  uint32 version = 3;
  
  // Serialized extension-specific command proto (e.g., SetDriveModeCommand)
  bytes payload = 4;
}

// Navigate to a destination
message GotoCommand {
  Location destination = 1; // Includes altitude for aerial vehicles
  float speed_ms = 2; // Target speed
}

// Emergency stop
message StopCommand {
  // Empty - just stop
}

// Return to home/launch position
message ReturnHomeCommand {
  // Empty - vehicle should return to its predefined home location
}

// Set operational mode
message SetModeCommand {
  OperationalMode mode = 1;
}

enum OperationalMode {
  MODE_MANUAL = 0;
  MODE_AUTONOMOUS = 1;
  MODE_GUIDED = 2;
}

// Set target speed
message SetSpeedCommand {
  float speed_ms = 1;
}

// ============================================================================
// Gateway → Vehicle Envelope
// ============================================================================

// GatewayMessage is the envelope for all messages from gateway to vehicles.
// Vehicles receive this on multicast 239.255.0.2:14551, unmarshal, and switch
// on which payload is set. Commands are filtered by vehicle_id; heartbeats
// are processed by all vehicles.
message GatewayMessage {
  oneof payload {
    Command command = 1;
    GatewayHeartbeat heartbeat = 2;
  }
}

// GatewayHeartbeat is sent periodically (every 1s) to let vehicles detect
// gateway connectivity loss. If a vehicle doesn't receive a heartbeat for
// OPENC2_GATEWAY_TIMEOUT (default 5s), it MUST trigger failsafe behavior.
//
// Failsafe modes (configured via OPENC2_FAILSAFE_MODE):
//   - RTL: Return to home/launch position (default for aerial)
//   - HOLD: Stop and hold current position (default for ground)
//   - CONTINUE: Continue autonomous mission
//   - LAND: Immediate landing (aerial only)
//
// See PROTOCOL.md "Gateway Loss Detection" for full behavioral specification.
//
// Vehicles SHOULD NOT use this for time sync - gateway clock is authoritative
// for the UI, but vehicles should rely on GPS/internal clocks for autonomy.
message GatewayHeartbeat {
  // Unix timestamp in milliseconds (UTC) - gateway's authoritative clock
  int64 timestamp_ms = 1;
  
  // Monotonic sequence number for ordering/loss detection (wraps at 2^32)
  // Vehicles can detect packet loss by tracking gaps in sequence.
  uint32 sequence_num = 2;
  
  // Number of currently connected UI clients (informational)
  uint32 connected_clients = 3;
  
  // Number of vehicles in registry (informational)
  uint32 tracked_vehicles = 4;
}

// ============================================================================
// Command Acknowledgment (Vehicle → Gateway)
// ============================================================================

message CommandAck {
  string command_id = 1;
  string vehicle_id = 2;
  int64 timestamp_ms = 3;
  AckStatus status = 4;
  string message = 5; // Human-readable status message
}

// Vehicle ack status values.
// NOTE: "timeout" is a gateway-synthetic status (not in this enum) sent when
// the vehicle doesn't respond within OPENC2_CMD_TIMEOUT. See PROTOCOL.md.
enum AckStatus {
  ACK_ACCEPTED = 0;
  ACK_REJECTED = 1;
  ACK_COMPLETED = 2;
  ACK_FAILED = 3;
}
